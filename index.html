<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <!-- 🔥 IMPORTANT META (fullscreen feel) -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#000000">

  <title>Stick Arc</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: black;
      touch-action: manipulation;
    }

    /* Rotate Warning */
    #rotate-warning {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      color: white;

      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;

      font-size: 22px;
      z-index: 9999;
    }

    .bg {
      width: 100vw;
      height: 100vh;
      background: url("bg1.png") center/cover no-repeat;
      position: relative;
      overflow: hidden;
      display: none;
    }

    /* Clouds */
    .cloud {
      position: absolute;
      width: 220px;
      opacity: 0.8;
      animation: moveCloud linear infinite;
      z-index: 2;
      pointer-events: none;
    }

    .cloud1 {
      top: 10%;
      animation-duration: 20s;
      animation-delay: 0s;
    }

    .cloud2 {
      top: 25%;
      animation-duration: 30s;
      animation-delay: -10s;
    }

    .cloud3 {
      top: 15%;
      animation-duration: 25s;
      animation-delay: -18s;
    }

    /* Left Image */
    .left-img {
      position: absolute;
      bottom: 0;
      left: 0;

      width: 800px;
      max-width: 50vw;

      z-index: 3;
      pointer-events: none;

      filter: drop-shadow(0 0 25px rgba(255, 0, 0, 0.6));
    }

    /* Animation */
    @keyframes moveCloud {
      from {
        transform: translateX(100vw);
      }
      to {
        transform: translateX(-250px);
      }
    }
  </style>
</head>

<body>

  <!-- Rotate Screen -->
  <div id="rotate-warning">
    <div>
      📱<br><br>
      Rotate Device<br>
      ➡️ Landscape Mode Required
    </div>
  </div>

  <!-- Main Background -->
  <div class="bg" id="bg">
    <img src="c1.png" class="cloud cloud1">
    <img src="c2.png" class="cloud cloud2">
    <img src="c3.png" class="cloud cloud3">
    <img src="sparcher.png" class="left-img">
  </div>

  <script>
    const warning = document.getElementById("rotate-warning");
    const bg = document.getElementById("bg");

    function enterFullscreen() {
      const el = document.documentElement;

      if (el.requestFullscreen) el.requestFullscreen();
      else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
      else if (el.msRequestFullscreen) el.msRequestFullscreen();
    }

    function hideAddressBar() {
      setTimeout(() => {
        window.scrollTo(0, 1);
      }, 100);
    }

    function checkOrientation() {
      if (window.innerHeight > window.innerWidth) {
        // Portrait
        warning.style.display = "flex";
        bg.style.display = "none";
      } else {
        // Landscape
        warning.style.display = "none";
        bg.style.display = "block";

        hideAddressBar();
      }
    }

    window.addEventListener("load", () => {
      checkOrientation();
      hideAddressBar();

      // try fullscreen automatically (may silently fail)
      enterFullscreen();
    });

    window.addEventListener("resize", checkOrientation);

    // First tap = guaranteed fullscreen
    document.addEventListener("click", () => {
      enterFullscreen();
      hideAddressBar();
    });
  </script>

</body>
</html>
